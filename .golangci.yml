version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - exhaustive
    - godot
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    godot:
      period: true
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      confidence: 0.8
      rules:
        - name: exported
          disabled: false
        - name: unexported-return
          disabled: true

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

exclusions:
  rules:
    - path: _test\.go
      linters:
        - errcheck

run:
  timeout: 3m